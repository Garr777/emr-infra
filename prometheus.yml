global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: emr-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: emr-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
