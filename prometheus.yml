global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: emr-backend
    metrics_path: /metrics
    static_configs:
      # The FastAPI app runs on the host (uvicorn :8080), not in a container.
      - targets: ["host.docker.internal:8080"]
        labels:
          service: emr-backend