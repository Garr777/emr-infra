services:
  postgres:
    image: postgres:16-alpine
    container_name: emr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: emr
      POSTGRES_USER: emr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emr -d emr"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    image: emr-backend:latest
    container_name: emr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgresql+psycopg://emr:${POSTGRES_PASSWORD}@postgres:5432/emr
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALG: HS256
      ACCESS_TOKEN_TTL_MIN: 15
      REFRESH_TOKEN_TTL_DAYS: 14
      SET_PASSWORD_TOKEN_TTL_HOURS: 72
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
    ports:
      - "8080:8080"

  frontend:
    image: emr-frontend:latest
    container_name: emr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: emr-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: emr-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  pgdata:
  promdata:
  grafanadata: