deploy:
  stage: deploy
  tags:
    - emr
  image: docker:cli
  script:
    - docker rm -f emr-backend emr-frontend 2>/dev/null || true
    - docker compose -p emr up -d --no-build
    # залить конфиги мониторинга в контейнеры (раннер изолирован, bind-mount с хоста невозможен)
    - docker cp prometheus.yml emr-prometheus:/etc/prometheus/prometheus.yml
    - docker cp grafana/provisioning/. emr-grafana:/etc/grafana/provisioning
    # перезапустить, чтобы prometheus перечитал конфиг, а grafana — datasources/дашборды
    - docker restart emr-prometheus emr-grafana
    # подождать, пока бек поднимется
    - sleep 10
    # миграции (с повтором на случай, если бек ещё не готов)
    - docker exec emr-backend alembic upgrade head
    # seed.py делает TRUNCATE всех таблиц — гоняем только при первом деплое (пустая users),
    # иначе он затрёт реальных пациентов/записи, созданные через приложение
    - |
      USERS=$(docker exec emr-postgres psql -U emr -d emr -tAc "SELECT count(*) FROM users")
      if [ "$USERS" = "0" ]; then
        echo "users пуст — выполняю seed.py"
        docker exec emr-backend python seed.py
      else
        echo "users содержит $USERS записей — пропускаю seed.py"
      fi
  only:
    - master